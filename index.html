<h1>About Calisthenics</h1>

<p>
Calisthenics is a type of exercise that uses your own body weight
to build strength, balance, flexibility, and endurance.
</p>

<p>
Popular exercises include:
</p>

<ul>
<li>Push-ups</li>
<li>Pull-ups</li>
<li>Dips</li>
<li>Squats</li>
<li>Planks</li>
</ul>
